name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quant:
    name: backend/quant — pytest + mypy + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv==0.4.27

      - name: Create virtual env
        run: uv venv .venv

      - name: Install project (with dev extras)
        run: |
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Ruff (lint, quant only)
        run: .venv/bin/ruff check quant

      - name: Ruff (format check, quant only)
        run: .venv/bin/ruff format --check quant

      - name: mypy --strict (quant)
        run: .venv/bin/mypy quant

      - name: pytest — quant suite only
        run: .venv/bin/pytest tests/quant

  backend-app:
    name: backend/app — pytest + mypy + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv==0.4.27

      - name: Create virtual env
        run: uv venv .venv

      - name: Install project (with dev extras)
        run: |
          uv pip install --python .venv/bin/python -e ".[dev]"

      # Scope ruff to the Agent D additions (services + optimize endpoint).
      # Legacy app modules have pre-existing lint debt that is out of scope
      # for this workflow until a dedicated cleanup pass lands.
      - name: Ruff (lint, Agent D scope)
        run: .venv/bin/ruff check app/services app/api/optimize.py

      - name: Ruff (format check, Agent D scope)
        run: .venv/bin/ruff format --check app/services app/api/optimize.py

      - name: mypy (Agent D scope)
        run: .venv/bin/mypy app/services app/api/optimize.py

      - name: pytest — app + data + api suites
        run: .venv/bin/pytest tests/api tests/data

  quant-ts:
    name: packages/quant-ts — vitest + tsc + eslint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: packages/quant-ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: pnpm install
        working-directory: .
        run: pnpm install --frozen-lockfile=false

      - name: tsc --noEmit (strict)
        run: pnpm run typecheck

      - name: eslint
        run: pnpm run lint

      - name: vitest (with coverage gate ≥ 90%)
        run: pnpm run test

      - name: tsup build (smoke test)
        run: pnpm run build

  frontend:
    name: frontend — vitest + tsc + eslint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: tsc --noEmit (strict)
        run: npm run typecheck

      - name: eslint
        run: npm run lint

      - name: vitest
        run: npm test -- --run

      - name: vite build (smoke test)
        run: npm run build
