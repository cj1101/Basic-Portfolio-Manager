name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quant:
    name: backend/quant — pytest + mypy + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv==0.4.27

      - name: Create virtual env
        run: uv venv .venv

      - name: Install project (with dev extras)
        run: |
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Ruff (lint, quant only)
        run: .venv/bin/ruff check quant

      - name: Ruff (format check, quant only)
        run: .venv/bin/ruff format --check quant

      - name: mypy --strict (quant)
        run: .venv/bin/mypy quant

      - name: pytest — quant suite only
        run: .venv/bin/pytest tests/quant

  backend-app:
    name: backend/app — pytest + mypy + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv==0.4.27

      - name: Create virtual env
        run: uv venv .venv

      - name: Install project (with dev extras)
        run: |
          uv pip install --python .venv/bin/python -e ".[dev]"

      # Scope ruff/mypy to the modules that are actively maintained by recent
      # agents (Agent D: services + optimize route; Agent E: chat service,
      # chat route, chat store). Legacy app modules have pre-existing lint
      # debt that is out of scope until a dedicated cleanup pass lands.
      - name: Ruff (lint, Agent D+E scope)
        run: .venv/bin/ruff check app/services app/api/optimize.py app/api/chat.py app/data/chat_store.py

      - name: Ruff (format check, Agent D+E scope)
        run: .venv/bin/ruff format --check app/services app/api/optimize.py app/api/chat.py app/data/chat_store.py

      - name: mypy (Agent D+E scope)
        run: .venv/bin/mypy app/services app/api/optimize.py app/api/chat.py app/data/chat_store.py

      - name: pytest — app + data + api + services suites
        run: .venv/bin/pytest tests/api tests/data tests/services

  quant-ts:
    name: packages/quant-ts — vitest + tsc + eslint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: packages/quant-ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: pnpm install
        working-directory: .
        run: pnpm install --frozen-lockfile=false

      - name: tsc --noEmit (strict)
        run: pnpm run typecheck

      - name: eslint
        run: pnpm run lint

      - name: vitest (with coverage gate ≥ 90%)
        run: pnpm run test

      - name: tsup build (smoke test)
        run: pnpm run build

  frontend:
    name: frontend — vitest + tsc + eslint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: tsc --noEmit (strict)
        run: npm run typecheck

      - name: eslint
        run: npm run lint

      - name: vitest
        run: npm test -- --run

      - name: vite build (smoke test)
        run: npm run build

  frontend-e2e:
    name: frontend — Playwright end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Install frontend dependencies
        run: pnpm install --ignore-workspace --frozen-lockfile=false

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e suite
        run: pnpm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
